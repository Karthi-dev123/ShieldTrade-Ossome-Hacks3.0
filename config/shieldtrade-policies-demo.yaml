agent_roles:
  analyst:
    allowed_tools:
    - market_data_fetch
    - write_report
    - recommend_trade
    denied_tools:
    - place_order
    - get_account
    - shell
    - web_fetch
    description: Researches equities and generates recommendations
    file_access:
      read:
      - /data/market/*
      - /data/earnings/*
      write:
      - /output/reports/*
  risk_manager:
    allowed_tools:
    - read_portfolio
    - check_limits
    - approve_trade
    - reject_trade
    denied_tools:
    - place_order
    - market_data_fetch
    - shell
    description: Validates recommendations against portfolio constraints
    file_access:
      read:
      - /output/reports/*
      - /data/portfolio/*
      write:
      - /output/risk-decisions/*
  trader:
    allowed_tools:
    - place_order
    - get_positions
    - get_account
    denied_tools:
    - market_data_fetch
    - write_report
    - shell
    - web_fetch
    description: Executes approved trades within delegated scope only
    file_access:
      read:
      - /output/risk-decisions/*
      write:
      - /output/trade-logs/*
    requires_delegation: true
data_safety:
  no_credential_access:
    blocked_paths:
    - ~/.openclaw/credentials
    - '*.env'
    - '*.key'
    - '*.pem'
    - '*.secret'
    description: Block access to credential files
    enforcement: block_and_log
  no_external_exfiltration:
    allowed_domains:
    - paper-api.alpaca.markets
    - data.alpaca.markets
    blocked_tools:
    - web_fetch
    - curl
    - wget
    description: Block outbound data to unauthorized endpoints
    enforcement: block_and_log
  no_pii_in_tool_args:
    description: Block tool calls containing PII patterns
    enforcement: block_and_log
    patterns:
    - \d{3}-\d{2}-\d{4}
    - \d{16}
    - \d{9}
delegation:
  trader_delegation:
    enforcement: block_and_log
    expiry_minutes: 5
    from_agent: risk_manager
    max_shares_per_delegation: 100
    max_usd_per_delegation: 2000
    must_match_recommendation: true
    no_sub_delegation: true
    required: true
    to_agent: trader
metadata:
  created_by: Team Avengers
  description: Intent-enforced multi-agent financial advisory policies
  enforcement: deterministic
  system: ShieldTrade
  version: 1.0.0
trading:
  approved_tickers:
    enforcement: block_and_log
    symbols:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
  order_limits:
    daily_aggregate_max_usd: 10000
    enforcement: block_and_log
    per_order_max_shares: 100
    per_order_max_usd: 2000
  portfolio_limits:
    enforcement: block_and_log
    max_single_position_pct: 30
    min_cash_reserve_pct: 10
  time_restrictions:
    earnings_blackout:
      enabled: false
      enforcement: block_and_log
      events:
      - date: '2026-04-25T08:00:00-04:00'
        description: Q1 2026 earnings
        ticker: AAPL
      - date: '2026-04-29T17:00:00-04:00'
        description: Q3 FY2026 earnings
        ticker: MSFT
      - date: '2026-04-29T17:00:00-04:00'
        description: Q1 2026 earnings
        ticker: GOOGL
      - date: '2026-05-01T17:00:00-04:00'
        description: Q1 2026 earnings
        ticker: AMZN
      - date: '2026-05-28T17:00:00-04:00'
        description: Q1 FY2027 earnings
        ticker: NVDA
      window_after_minutes: 30
      window_before_minutes: 30
    market_hours_only:
      applies_to_roles:
      - trader
      applies_to_tools:
      - place_order
      - submit_order
      - order
      enabled: false
      end: '16:00'
      enforcement: block_and_log
      start: 09:30
      timezone: America/New_York
